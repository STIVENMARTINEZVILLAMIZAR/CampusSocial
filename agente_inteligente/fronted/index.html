<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente IA - Chat Inteligente</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🤖 Asistente IA</h1>
                <p class="subtitle">Tu agente inteligente solo para ti</p>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>¡Hola! 👋 Soy tu asistente de IA especializado. ¿En qué puedo ayudarte hoy?</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <footer class="chat-input-area">
                <form id="chatForm" class="chat-form">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="userInput" 
                            class="chat-input" 
                            placeholder="Escribe tu pregunta aquí..." 
                            autocomplete="off"
                        >
                        <button type="submit" class="send-button" id="sendBtn">
                            <span class="send-icon">📤</span>
                        </button>
                    </div>
                </form>
                <p class="input-hint">Presiona Enter o haz clic en el botón para enviar</p>
            </footer>
        </main>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="spinner"></div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
